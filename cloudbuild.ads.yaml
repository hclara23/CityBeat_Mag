# Builds the ads portal image using Dockerfile.ads and pushes it to GCR.
# Used by: gcloud builds submit --config cloudbuild.ads.yaml --project kerstenblueprint
# Then deploy: gcloud run deploy citybeat-ads --image gcr.io/kerstenblueprint/citybeat-ads:latest ...
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.ads
      - -t
      - gcr.io/kerstenblueprint/citybeat-ads:latest
      - .
images:
  - gcr.io/kerstenblueprint/citybeat-ads:latest
options:
  machineType: E2_HIGHCPU_8
  # Stream to Cloud Logging only. Avoids the default GCS logs bucket, which a
  # service-account submitter (GitHub Actions) can't use — that mismatch makes
  # `gcloud builds submit` exit 1 even when the build itself succeeds.
  logging: CLOUD_LOGGING_ONLY
