name: Deploy Web App

# Deploys the web app to its REAL production target: the Cloud Run service
# `citybeat-web` in the `kerstenblueprint` GCP project (citybeatmag.co).
# (The previous version deployed to Vercel, which does not serve the live site.)
#
# Requires repo secret GCP_SA_KEY: a JSON service-account key with roles
#   roles/run.admin, roles/cloudbuild.builds.editor, roles/iam.serviceAccountUser,
#   roles/storage.admin (for the source upload bucket).
# Public NEXT_PUBLIC_* build values are baked by the root Dockerfile; runtime
# secrets (STRIPE_SECRET_KEY, INGEST_SECRET, NEXT_PUBLIC_FIREBASE_*) persist on
# the Cloud Run service across deploys.

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

env:
  GCP_PROJECT: kerstenblueprint
  GCP_REGION: us-central1
  SERVICE: citybeat-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check --workspace=apps/web

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (source build)
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "$GCP_PROJECT" \
            --region "$GCP_REGION" \
            --quiet

      # Fail the workflow (and page Slack) if the LIVE site is broken after
      # deploy — build success alone doesn't prove the app serves traffic.
      - name: Post-deploy smoke test
        run: |
          sleep 15
          for path in "/en" "/en/directory" "/api/health"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://citybeatmag.co$path")
            echo "GET $path -> $code"
            if [ "$code" != "200" ]; then
              echo "Smoke test FAILED on $path (got $code)"
              exit 1
            fi
          done

      - name: Notify Slack on Success
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Web app deployed to Cloud Run",
              "blocks": [
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "✅ *Web App Deployed to Cloud Run*\n${{ github.actor }} deployed to production (citybeatmag.co)" }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on Failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Web app deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "❌ *Web App Deployment Failed*\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
