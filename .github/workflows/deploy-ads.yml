name: Deploy Ads Portal

# Deploys the ads portal to the Cloud Run service `citybeat-ads` in the
# `kerstenblueprint` GCP project. Builds with Dockerfile.ads via Cloud Build
# (the default --source Dockerfile is the web app), then deploys the image.
#
# Requires repo secret GCP_SA_KEY (same SA as the web deploy).

on:
  push:
    branches: [main]
    paths:
      - 'apps/ads/**'
      - 'packages/**'
      - 'Dockerfile.ads'
      - 'cloudbuild.ads.yaml'
      - '.github/workflows/deploy-ads.yml'
  workflow_dispatch:

env:
  GCP_PROJECT: kerstenblueprint
  GCP_REGION: us-central1
  SERVICE: citybeat-ads
  IMAGE: gcr.io/kerstenblueprint/citybeat-ads:latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check --workspace=apps/ads

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build image (Dockerfile.ads)
        run: gcloud builds submit --config cloudbuild.ads.yaml --project "$GCP_PROJECT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --project "$GCP_PROJECT" \
            --region "$GCP_REGION" \
            --quiet

      - name: Notify Slack on Success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Ads portal deployed to Cloud Run",
              "blocks": [
                { "type": "section", "text": { "type": "mrkdwn", "text": "✅ *Ads Portal Deployed to Cloud Run*\n${{ github.actor }} deployed to production" } }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Ads portal deployment failed",
              "blocks": [
                { "type": "section", "text": { "type": "mrkdwn", "text": "❌ *Ads Portal Deployment Failed*\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" } }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
