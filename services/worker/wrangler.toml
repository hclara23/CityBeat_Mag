name = "citybeat-worker"
main = "src/index.ts"
compatibility_date = "2025-07-18"

# Brief-automation cron schedule (America/Chihuahua offsets handled in code).
# NOTE: `crons` must be a flat array of strings — the [[triggers.crons]]
# array-of-tables form serializes as {"cron":{"cron":...}} and the Cloudflare
# schedules API rejects it with error 10026 ("Could not parse request body").
[triggers]
crons = ["0 7 * * *", "0 10 * * *", "0 13 * * *", "0 16 * * *", "0 19 * * *"]

[vars]
INGEST_URL = "https://citybeatmag.co"
# STRIPE_WEBHOOK_SECRET is a SECRET (set via `wrangler secret put`), not a plaintext var.

# Custom route for the webhook/tracking HTTP endpoints. Requires the citybeatmag.co
# zone to live in THIS Cloudflare account. citybeatmag.co is fronted by Firebase
# Hosting, so this may not apply — uncomment only once the zone is in Cloudflare.
# routes = [
#   { pattern = "api.citybeatmag.co/*", zone_name = "citybeatmag.co" }
# ]

# Secrets are set via `wrangler secret put <NAME>` (never committed):
#   INGEST_SECRET, STRIPE_SECRET_KEY, DEEPL_API_KEY, RESEND_API_KEY, NEWS_API_KEY
